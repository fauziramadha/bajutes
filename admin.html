<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ZOOS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --charcoal: #0B0B0B;
            --card: #151515;
            --accent: #C5A059;
            --danger: #ff4444;
            --success: #00c851;
        }
        body {
            background: var(--charcoal);
            color: #eee;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
        }
        
        /* LOGIN OVERLAY */
        #login-page {
            position: fixed;
            inset: 0;
            background: var(--charcoal);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 10px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        /* SIDEBAR */
        nav {
            width: 250px;
            height: 100vh;
            background: #000;
            padding: 20px;
            position: sticky;
            top: 0;
            display: none; /* Show after login */
        }
        nav a {
            display: block;
            color: #888;
            padding: 12px 15px;
            text-decoration: none;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        nav a:hover, nav a.active {
            background: var(--accent);
            color: black;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 40px;
            display: none; /* Show after login */
        }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #222;
        }
        th { color: var(--accent); }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-add { background: var(--accent); color: black; }
        .btn-delete { background: var(--danger); color: white; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; position: static; }
        }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-page">
        <div class="login-box">
            <h2 style="color: var(--accent);">ZOOS ADMIN</h2>
            <input type="email" id="admin-email" placeholder="Email Admin">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn btn-add" onclick="login()" style="width: 100%; margin-top: 10px;">MASUK</button>
        </div>
    </div>

    <!-- Sidebar -->
    <nav id="admin-nav">
        <h3 style="color: var(--accent); margin-bottom: 30px;">DASHBOARD</h3>
        <a href="#" onclick="showSection('orders-sec')" class="active">Pesanan Masuk</a>
        <a href="#" onclick="showSection('products-sec')">Manajemen Produk</a>
        <a href="#" onclick="showSection('settings-sec')">Pengaturan Toko</a>
        <a href="#" onclick="logout()" style="margin-top: 50px; color: var(--danger);">Logout</a>
    </nav>

    <main id="admin-main">
        <!-- Section Pesanan -->
        <div id="orders-sec" class="section active">
            <h2>Pesanan Real-time</h2>
            <div id="order-list">
                <!-- Orders injected here -->
            </div>
        </div>

        <!-- Section Produk -->
        <div id="products-sec" class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Produk</h2>
                <button class="btn btn-add" onclick="showProductForm()">+ Tambah Produk</button>
            </div>
            
            <div id="product-form" class="card" style="display: none; margin-top: 20px;">
                <h3 id="form-title">Tambah Produk Baru</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="p-name" placeholder="Nama Produk">
                <input type="number" id="p-price" placeholder="Harga (Angka)">
                <input type="number" id="p-stock" placeholder="Stok">
                <select id="p-cat">
                    <option value="Wear Our Way">Wear Our Way</option>
                    <option value="Flexcool">Flexcool</option>
                    <option value="Polo Shirt">Polo Shirt</option>
                    <option value="Baggy Jeans">Baggy Jeans</option>
                    <option value="Oversize">Oversize</option>
                </select>
                <select id="p-status">
                    <option value="ready">Ready Stock</option>
                    <option value="preorder">Pre-Order</option>
                </select>
                <textarea id="p-desc" placeholder="Deskripsi"></textarea>
                <p style="font-size: 12px; color: var(--accent);">Upload Foto (Otomatis ke ImgBB):</p>
                <input type="file" id="p-image-file" accept="image/*">
                <div style="margin-top: 15px;">
                    <button class="btn btn-add" onclick="saveProduct()">SIMPAN PRODUK</button>
                    <button class="btn" onclick="hideProductForm()">BATAL</button>
                </div>
            </div>

            <div id="admin-product-list" class="product-grid-admin">
                <!-- Table products -->
            </div>
        </div>

        <!-- Section Settings -->
        <div id="settings-sec" class="section">
            <h2>Pengaturan Toko</h2>
            <div class="card">
                <h3>Jam Operasional</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="set-open" placeholder="Jam Buka (Contoh: 08)">
                    <input type="number" id="set-close" placeholder="Jam Tutup (Contoh: 22)">
                </div>
                <select id="set-status">
                    <option value="open">Toko Buka (Otomatis/Manual)</option>
                    <option value="closed">Toko Tutup (Paksa)</option>
                </select>
                <button class="btn btn-add" onclick="saveGeneralSettings()">Update Status</button>
            </div>
        </div>
    </main>

    <script>
        // KREDENSIAL API (SAMA DENGAN INDEX)
        const firebaseConfig = {
            apiKey: "AIzaSyDRiGvXRvJ3zRpIzlLvBpw1Kvx8NM-qBzM",
            authDomain: "baju-fb02d.firebaseapp.com",
            projectId: "baju-fb02d",
            storageBucket: "baju-fb02d.firebasestorage.app",
            messagingSenderId: "316514990594",
            appId: "1:316514990594:web:5b39007663b148e910851b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const IMGBB_API_KEY = "f02239de14c7bff7e3297f0b3648eabc";

        // --- AUTH LOGIC ---
        function login() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('admin-nav').style.display = 'block';
                    document.getElementById('admin-main').style.display = 'block';
                    notifyTelegram("Admin Login Berhasil");
                    initAdmin();
                })
                .catch(err => {
                    alert("Gagal Login: " + err.message);
                    notifyTelegram("⚠️ Gagal Login Admin!");
                });
        }

// --- ADMIN INITIALIZATION ---
        function initAdmin() {
            fetchAdminProducts();
            fetchAdminOrders();
            fetchAdminSettings();
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // --- MANAJEMEN PRODUK & IMGBB ---
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.data.url;
            } catch (error) {
                console.error("Upload Error:", error);
                return null;
            }
        }

        async function saveProduct() {
            const id = document.getElementById('edit-id').value || Date.now();
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const stock = document.getElementById('p-stock').value;
            const category = document.getElementById('p-cat').value;
            const status = document.getElementById('p-status').value;
            const desc = document.getElementById('p-desc').value;
            const fileInput = document.getElementById('p-image-file');

            if (!name || !price) return alert("Nama dan Harga wajib diisi");

            let imageUrl = "";
            if (fileInput.files[0]) {
                alert("Sedang mengunggah gambar ke ImgBB, mohon tunggu...");
                imageUrl = await uploadToImgBB(fileInput.files[0]);
            } else {
                // Jika edit dan tidak ganti gambar, ambil gambar lama (logika sederhana)
                imageUrl = "https://picsum.photos/400/600"; 
            }

            const productData = {
                name, price, stock, category, status, desc,
                image: imageUrl,
                updatedAt: new Date().toISOString()
            };

            db.ref('products/' + id).update(productData)
                .then(() => {
                    alert("Produk Berhasil Disimpan!");
                    hideProductForm();
                });
        }

        function fetchAdminProducts() {
            db.ref('products').on('value', (snapshot) => {
                const products = snapshot.val();
                const container = document.getElementById('admin-product-list');
                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Gambar</th>
                                <th>Nama</th>
                                <th>Harga</th>
                                <th>Stok</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="p-table-body"></tbody>
                    </table>
                `;
                const tbody = document.getElementById('p-table-body');
                for (let id in products) {
                    const p = products[id];
                    tbody.innerHTML += `
                        <tr>
                            <td><img src="${p.image}" width="50"></td>
                            <td>${p.name}</td>
                            <td>Rp ${parseInt(p.price).toLocaleString()}</td>
                            <td>${p.stock}</td>
                            <td>
                                <button class="btn btn-add" onclick="editProduct('${id}')">Edit</button>
                                <button class="btn btn-delete" onclick="deleteProduct('${id}')">Hapus</button>
                            </td>
                        </tr>
                    `;
                }
            });
        }

        function deleteProduct(id) {
            if(confirm("Hapus produk ini?")) db.ref('products/' + id).remove();
        }

        function showProductForm() {
            document.getElementById('product-form').style.display = 'block';
            document.getElementById('form-title').innerText = "Tambah Produk Baru";
            document.getElementById('edit-id').value = "";
        }

        function hideProductForm() {
            document.getElementById('product-form').style.display = 'none';
        }

        // --- MANAJEMEN PESANAN & WHATSAPP ---
        function fetchAdminOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val();
                const container = document.getElementById('order-list');
                container.innerHTML = '';

                for (let id in orders) {
                    const o = orders[id];
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <h3 style="color:var(--accent)">${o.orderId} - ${o.customer.name}</h3>
                                <p style="font-size:12px; color:#888;">${new Date(o.timestamp).toLocaleString()}</p>
                                <div style="margin:10px 0;">
                                    ${o.items.map(i => `<small>${i.name} (x${i.qty})</small><br>`).join('')}
                                </div>
                                <strong>Total: ${o.total}</strong><br>
                                <small>Metode: ${o.method}</small>
                            </div>
                            <div style="text-align:right;">
                                <select onchange="updateStatus('${id}', this.value)" style="width:auto; background:#333;">
                                    <option value="Menunggu" ${o.status === 'Menunggu' ? 'selected' : ''}>Menunggu</option>
                                    <option value="Diproses" ${o.status === 'Diproses' ? 'selected' : ''}>Diproses</option>
                                    <option value="Selesai" ${o.status === 'Selesai' ? 'selected' : ''}>Selesai</option>
                                </select>
                                <br>
                                <button class="btn btn-add" style="margin-top:10px; background:#25D366; color:white;" 
                                    onclick="chatCustomer('${o.customer.phone}', '${o.orderId}', '${o.total}')">
                                    Chat WhatsApp
                                </button>
                                <button class="btn btn-delete" style="margin-top:10px;" onclick="deleteOrder('${id}')">Hapus</button>
                            </div>
                        </div>
                    `;
                    container.prepend(card);
                }
            });
        }

        function updateStatus(id, newStatus) {
            db.ref('orders/' + id).update({ status: newStatus });
        }

        function deleteOrder(id) {
            if(confirm("Hapus data pesanan ini?")) db.ref('orders/' + id).remove();
        }

        function chatCustomer(phone, orderId, total) {
            let cleanPhone = phone.replace(/[^0-9]/g, '');
            if (cleanPhone.startsWith('0')) cleanPhone = '62' + cleanPhone.slice(1);
            
            const message = `Halo Kak, kami dari Admin ZOOS Premium. %0A%0AKonfirmasi pesanan ID: *${orderId}* dengan total *${total}*. %0AApakah sudah melakukan pembayaran? Mohon kirimkan bukti transfernya ya Kak. Terima kasih!`;
            window.open(`https://wa.me/${cleanPhone}?text=${message}`, '_blank');
        }

        // --- PENGATURAN UMUM ---
        function saveGeneralSettings() {
            const open = document.getElementById('set-open').value;
            const close = document.getElementById('set-close').value;
            const status = document.getElementById('set-status').value;

            db.ref('settings').update({
                openTime: open,
                closeTime: close,
                storeStatus: status
            }).then(() => alert("Pengaturan Toko Diperbarui!"));
        }

        // --- TELEGRAM NOTIFIER ---
        function notifyTelegram(msg) {
            const botToken = "8543331264:AAHp3-UQv4iE-lNzmqzdTpTr0gyA9Te8YYY";
            const chatId = "1444132958";
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=Admin System: ${msg}`);
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
